<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pastel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Estilos personalizados para los colores */
        .input-lila {
            background-color: #e0d4f7 !important; /* Lila claro */
            border-color: #b19cd9;
        }

        .input-rosa {
            background-color: #fce4ec !important; /* Rosa claro */
            border-color: #f06292;
        }

        /* Cambiamos el color del botón para que haga juego */
        .btn-custom {
            background-color: #ba68c8;
            border: none;
            color: white;
        }
        .btn-custom:hover {
            background-color: #9c27b0;
            color: white;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

    <div class="container" style="max-width: 500px;">
        <div class="card p-4 shadow-sm border-0">
            <h3 class="text-center mb-4" style="color: #7b1fa2;">Iniciar Sesión</h3>
            
            <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label">Usuario (Email)</label>
                <input type="email" class="form-control input-lila" id="exampleFormControlInput1" placeholder="nombre@ejemplo.com">
            </div>

            <div class="mb-3">
                <label for="inputPassword" class="form-label">Contraseña</label>
                <input type="password" class="form-control input-rosa" id="inputPassword" placeholder="Tu contraseña">
            </div>

            <button type="button" class="btn btn-custom w-100">Ingresar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
